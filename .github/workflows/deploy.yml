name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'coverLetterAdapter/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: coverLetterAdapter/package-lock.json
      - run: npm ci
        working-directory: coverLetterAdapter
      - run: npm run build
        working-directory: coverLetterAdapter
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: coverLetterAdapter/dist
      - id: deployment
        uses: actions/deploy-pages@v4
